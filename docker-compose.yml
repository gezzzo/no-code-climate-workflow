services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/storage:/app/storage
    environment:
      GITHUB_IMPORT_MAX_BYTES: "209715200"
      GITHUB_IMPORT_TIMEOUT_SECONDS: "30"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: http://104.248.52.20:8000/api
    ports:
      - "5173:80"
    depends_on:
      - backend
